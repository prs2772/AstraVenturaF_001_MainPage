<div class="av-page">

  <div class="av-page__header">
    <div>
      <h1 class="av-page__title">Register Vehicle</h1>
      <p class="av-page__subtitle">Add a new unit to the fleet registry</p>
    </div>
    <a routerLink="/vehiculos" class="av-btn av-btn--ghost">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
      </svg>
      Back to Fleet
    </a>
  </div>

  <!-- Success -->
  <div class="av-alert av-alert--success" *ngIf="success">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
    Vehicle registered successfully. Redirecting...
  </div>

  <!-- Error -->
  <div class="av-alert av-alert--error" *ngIf="error">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    {{ error }}
  </div>

  <div class="av-glass-panel">
    <div class="av-glass-panel__scanner"></div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="av-form" novalidate>

      <!-- Row 1: VIN full width -->
      <div class="av-field" [class.av-field--error]="f['vin'].invalid && f['vin'].touched">
        <label class="av-label">VIN — Vehicle Identification Number</label>
        <div class="av-input-wrap">
          <span class="av-input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
              <path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/>
            </svg>
          </span>
          <input class="av-input" type="text" formControlName="vin"
            placeholder="5YJ3E1EB1LF000001" maxlength="17" style="text-transform:uppercase"/>
        </div>
        <span class="av-field-error" *ngIf="f['vin'].errors?.['required'] && f['vin'].touched">VIN required</span>
        <span class="av-field-error" *ngIf="(f['vin'].errors?.['minlength'] || f['vin'].errors?.['maxlength']) && f['vin'].touched">VIN must be exactly 17 characters</span>
      </div>

      <!-- Row 2: Brand + Model -->
      <div class="av-form-grid">
        <div class="av-field" [class.av-field--error]="f['brand'].invalid && f['brand'].touched">
          <label class="av-label">Brand</label>
          <div class="av-input-wrap">
            <span class="av-input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
              </svg>
            </span>
            <input class="av-input" type="text" formControlName="brand" placeholder="Tesla"/>
          </div>
          <span class="av-field-error" *ngIf="f['brand'].errors?.['required'] && f['brand'].touched">Brand required</span>
        </div>

        <div class="av-field" [class.av-field--error]="f['model'].invalid && f['model'].touched">
          <label class="av-label">Model</label>
          <div class="av-input-wrap">
            <span class="av-input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
              </svg>
            </span>
            <input class="av-input" type="text" formControlName="model" placeholder="Model 3"/>
          </div>
          <span class="av-field-error" *ngIf="f['model'].errors?.['required'] && f['model'].touched">Model required</span>
        </div>
      </div>

      <!-- Row 3: Year + Price -->
      <div class="av-form-grid">
        <div class="av-field" [class.av-field--error]="f['year'].invalid && f['year'].touched">
          <label class="av-label">Year</label>
          <div class="av-input-wrap">
            <span class="av-input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
            </span>
            <input class="av-input" type="number" formControlName="year" placeholder="2024"/>
          </div>
          <span class="av-field-error" *ngIf="f['year'].errors?.['required'] && f['year'].touched">Year required</span>
        </div>

        <div class="av-field" [class.av-field--error]="f['price'].invalid && f['price'].touched">
          <label class="av-label">Price (USD)</label>
          <div class="av-input-wrap">
            <span class="av-input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>
              </svg>
            </span>
            <input class="av-input" type="number" formControlName="price" placeholder="45000"/>
          </div>
          <span class="av-field-error" *ngIf="f['price'].errors?.['required'] && f['price'].touched">Price required</span>
        </div>
      </div>

      <!-- Row 4: Capacity + kmPerLiter -->
      <div class="av-form-grid">
        <div class="av-field" [class.av-field--error]="f['passengerCapacity'].invalid && f['passengerCapacity'].touched">
          <label class="av-label">Passenger Capacity</label>
          <div class="av-input-wrap">
            <span class="av-input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/>
              </svg>
            </span>
            <input class="av-input" type="number" formControlName="passengerCapacity" placeholder="5"/>
          </div>
          <span class="av-field-error" *ngIf="f['passengerCapacity'].errors?.['required'] && f['passengerCapacity'].touched">Capacity required</span>
        </div>

        <div class="av-field" [class.av-field--error]="f['kmPerLiter'].invalid && f['kmPerLiter'].touched">
          <label class="av-label">Efficiency (km/L)</label>
          <div class="av-input-wrap">
            <span class="av-input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
              </svg>
            </span>
            <input class="av-input" type="number" formControlName="kmPerLiter" placeholder="18.5" step="0.1"/>
          </div>
          <span class="av-field-error" *ngIf="f['kmPerLiter'].errors?.['required'] && f['kmPerLiter'].touched">Efficiency required</span>
        </div>
      </div>

      <!-- Submit -->
      <div class="av-form-submit">
        <button class="av-btn av-btn--primary" type="submit" [disabled]="loading">
          <span class="av-spinner-sm" *ngIf="loading"></span>
          <svg *ngIf="!loading" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
          </svg>
          {{ loading ? 'Registering...' : 'Register Vehicle' }}
        </button>
      </div>

    </form>
  </div>
</div>
