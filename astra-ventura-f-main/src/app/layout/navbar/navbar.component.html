<header class="av-navbar">

  <!-- Left: HUD status -->
  <div class="av-navbar__left">
    <span class="av-navbar__dot"></span>
    <span class="av-navbar__status">System Online</span>
  </div>

  <!-- Right: user + logout -->
  <div class="av-navbar__right">

    <!-- User info -->
    <div class="av-navbar__user" *ngIf="auth.currentUser$ | async as user">
      <div class="av-navbar__avatar">
        {{ user.nombre?.charAt(0)?.toUpperCase()?? '' }}
      </div>
      <span class="av-navbar__username">{{ user.nombre }}</span>
    </div>

    <!-- Divider -->
    <div class="av-navbar__divider"></div>

    <!-- Logout -->
    <button class="av-navbar__logout" (click)="logout()" title="Logout">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      <span>Logout</span>
    </button>

  </div>

</header>
